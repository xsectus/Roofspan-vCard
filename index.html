<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roofspan – Our Team</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --rs-dark: #2a2e26;
      --rs-bg:   #1a1d18;
      --rs-teal: #3a6e72;
      --rs-teal-light: #4a8e8a;
      --rs-orange: #c8541a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--rs-bg);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1rem 4rem;
    }
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 2.5rem;
    }
    .brand-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 52px;
      letter-spacing: 5px;
      line-height: 1;
      text-shadow: 0 2px 12px rgba(0,0,0,0.5);
    }
    .brand-sub {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--rs-teal-light);
      font-weight: 400;
    }
    .header-bar {
      width: 40px;
      height: 2px;
      background: var(--rs-orange);
      margin-top: 6px;
    }
    .section-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.28);
      margin-bottom: 1.25rem;
      text-align: center;
    }
    .grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 400px;
    }
    .person-card {
      background: var(--rs-dark);
      border-radius: 14px;
      border: 0.5px solid rgba(58,110,114,0.25);
      overflow: hidden;
      position: relative;
    }
    .person-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: var(--rs-teal);
    }
    .person-card::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: var(--rs-orange);
    }
    .card-inner {
      padding: 1.1rem 1.2rem 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: rgba(58,110,114,0.18);
      border: 1.5px solid rgba(58,110,114,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 1px;
      color: var(--rs-teal-light);
    }
    .person-info { flex: 1; }
    .person-name {
      font-size: 16px;
      font-weight: 500;
      color: #fff;
      margin-bottom: 2px;
    }
    .person-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--rs-teal-light);
      font-weight: 400;
      margin-bottom: 7px;
    }
    .person-contact {
      font-size: 11.5px;
      color: rgba(255,255,255,0.45);
      font-weight: 300;
      line-height: 1.7;
    }
    .card-btns {
      display: flex;
      gap: 8px;
      padding: 0 1.2rem 1.1rem;
    }
    .btn-view {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: var(--rs-teal);
      color: rgba(255,255,255,0.92);
      font-size: 12px;
      font-weight: 500;
      padding: 9px 0;
      border-radius: 8px;
      text-decoration: none;
      font-family: 'DM Sans', sans-serif;
      transition: background 0.15s;
    }
    .btn-view:hover { background: var(--rs-teal-light); }
    .footer {
      margin-top: 3rem;
      font-size: 10px;
      color: rgba(255,255,255,0.15);
      letter-spacing: 1px;
      text-align: center;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="brand-name"><span style="color:#ffffff;">ROOF</span><span style="color:#c8541a;">SPAN</span></div>
    <div class="brand-sub">Commercial Roofing & Exterior Wall Panel Contractor</div>
    <div class="header-bar"></div>
  </div>

  <div class="section-label">Our Team</div>

  <div class="grid">

    <!-- Chris Wygle -->

      <div class="card-inner">
        <div class="avatar">CW</div>
        <div class="person-info">
          <div class="person-name">Christopher Wygle</div>
          <div class="person-title">Owner</div>
          <div class="person-contact">
            918-688-0618<br>
            chris.wygle@roofspan.com
          </div>
        </div>
      </div>
      <div class="card-btns">
        <a class="btn-view" href="roofspan_chris_vCard.html">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
            <rect x="2" y="2" width="12" height="12" rx="2" stroke="white" stroke-width="1.3"/>
            <path d="M5 6h6M5 9h4" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
          View Card
        </a>
      </div>
    </div>

    <!-- Tony Sauter -->
    <div class="person-card">
      <div class="card-inner">
        <div class="avatar">TS</div>
        <div class="person-info">
          <div class="person-name">Tony Sauter</div>
          <div class="person-title">Business Development Manager</div>
          <div class="person-contact">
            405-702-3967<br>
            tony.sauter@roofspan.com
          </div>
        </div>
      </div>
      <div class="card-btns">
        <a class="btn-view" href="roofspan_Sauter_vCard.html">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
            <rect x="2" y="2" width="12" height="12" rx="2" stroke="white" stroke-width="1.3"/>
            <path d="M5 6h6M5 9h4" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
          View Card
        </a>
      </div>
    </div>

  </div>

  <div class="footer">roofspan.com &nbsp;·&nbsp; Sapulpa, OK</div>

</body>
</html>
