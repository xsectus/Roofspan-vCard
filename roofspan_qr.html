<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Roofspan Company Directory</title>
    <meta property="og:title" content="Roofspan – Contact Our Team" />
    <meta
      property="og:description"
      content="Click or Scan to connect with the Roofspan team. Commercial roofing & exterior wall systems."
    />
    <meta property="og:url" content="https://contact.roofspan.com" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta property="og:image" content="https://contact.roofspan.com/Roofspan_Directory.png" />
    <meta name="twitter:image" content="https://contact.roofspan.com/Roofspan_Directory.png" />
    <meta name="twitter:title" content="Roofspan – Contact Our Team" />
    <meta
      name="twitter:description"
      content="Click or Scan to connect with the Roofspan team."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #1a1d18;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2.5rem 1rem;
        gap: 1.25rem;
        font-family: "DM Sans", sans-serif;
      }
      .card {
        background: #2a2e26;
        border-radius: 18px;
        border: 0.5px solid rgba(58, 110, 114, 0.3);
        padding: 1.75rem 2.25rem 1.6rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
        position: relative;
        overflow: hidden;
        width: 300px;
      }
      .card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 5px;
        background: #3a6e72;
      }
      .card::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: #c8541a;
      }
      .brand {
        font-family: "Bebas Neue", sans-serif;
        font-size: 38px;
        letter-spacing: 5px;
        line-height: 1;
      }
      .brand .roof {
        color: #fff;
      }
      .brand .span {
        color: #c8541a;
      }
      .brand-sub {
        font-size: 10px;
        letter-spacing: 2.5px;
        text-transform: uppercase;
        color: #4a8e8a;
        margin-top: -6px;
      }
      .qr-wrap {
        background: #fff;
        border-radius: 10px;
        padding: 12px;
        position: relative;
        cursor: pointer;
        display: inline-block;
      }
      .qr-wrap img {
        display: block;
        width: 200px;
        height: 200px;
      }
      .logo-overlay {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: #fff;
        border-radius: 5px;
        padding: 4px 8px 3px;
        display: flex;
        flex-direction: row;
        align-items: center;
        border: 1.5px solid #eee;
        white-space: nowrap;
      }
      .logo-roof {
        font-family: "Bebas Neue", sans-serif;
        font-size: 14px;
        color: #2a2e26;
        letter-spacing: 2px;
      }
      .logo-span {
        font-family: "Bebas Neue", sans-serif;
        font-size: 14px;
        color: #c8541a;
        letter-spacing: 2px;
      }
      .scan-label {
        font-size: 10px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.3);
      }
      .site-link {
        font-size: 12px;
        color: #4a8e8a;
        text-decoration: none;
        letter-spacing: 0.3px;
      }
      .site-link:hover {
        color: #6ab0ac;
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="brand">
        <span class="roof">ROOF</span><span class="span">SPAN</span>
      </div>
      <div class="brand-sub">Meet Our Team</div>

      <a
        class="qr-wrap"
        href="https://xsectus.github.io/Roofspan-vCard/"
        target="_blank"
        id="qrLink"
      >
        <img
          id="qrImg"
          src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://xsectus.github.io/Roofspan-vCard/&color=2a2e26&bgcolor=ffffff&ecc=H&margin=0"
          alt="Roofspan QR Code"
        />
        <div class="logo-overlay">
          <span class="logo-roof">ROOF</span><span class="logo-span">SPAN</span>
        </div>
      </a>

      <div class="scan-label">Click or Scan to view contacts</div>
      <a
        class="site-link"
        href="https://xsectus.github.io/Roofspan-vCard/"
        target="_blank"
        >Roofspan Contact Directory</a
      >
    </div>
  </body>
</html>
